# ──────────────────────────────────────────────────────────────
# Local development stack — mirrors Railway production config
# but with hot-reload via Spring Boot DevTools.
#
# Usage:
#   docker compose up --build        # first run / pom.xml changed
#   docker compose up                # subsequent runs (fast)
#   docker compose down              # stop everything
#
# Source code is volume-mounted → editing .java files auto-restarts
# the app inside the container (~3-5s). No image rebuild needed.
# ──────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: roomate-api
    ports:
      - "${BACKEND_PORT:-8085}:${BACKEND_PORT:-8085}"
    environment:
      # ── Database (matches application.yml placeholders) ──
      - POSTGRESQL_HOST=postgresdb
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DATABASE=daroomate
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=password
      # ── Budget Database ──
      - BUDGET_DB_HOST=budgetdb
      - BUDGET_DB_PORT=5432
      - BUDGET_DB_NAME=daroomate_budget
      - BUDGET_DB_USERNAME=postgres
      - BUDGET_DB_PASSWORD=password
      # ── Application ──
      - ACTIVE_PROFILE=dev
      - CONTAINER_PORT=${BACKEND_PORT:-8085}
      - JWT_KEY=your-super-secret-key-that-is-at-least-32-chars-long
      # ── Email (SMTP) ──
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-25}
      - EMAIL_ID=${EMAIL_ID:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      # ── Redis ──
      - REDIS_URL=redis://redis:6379
      # ── CORS ──
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      # Mount source so DevTools picks up changes without rebuild
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml:ro
    depends_on:
      postgresdb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT:-8085}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - roomate-network

  postgresdb:
    container_name: roomate-db
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: daroomate
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roomate-network

  budgetdb:
    container_name: roomate-budget-db
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: daroomate_budget
    ports:
      - "5434:5432"
    volumes:
      - budget_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roomate-network

  redis:
    container_name: roomate-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - roomate-network

volumes:
  postgres_data:
  budget_postgres_data:

networks:
  roomate-network:
